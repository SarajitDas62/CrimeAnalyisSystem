<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Crime Analysis & Prediction System{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Leaflet.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Premium custom style sheet -->
    <link rel="stylesheet" href="/static/css/style.css">
    
    <!-- Leaflet.js JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Glassmorphism Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="bi bi-shield-shaded text-primary me-2 fs-3"></i>
                <span class="brand-title navbar-brand-title">CAPS</span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <!-- Main Nav Links -->
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="/">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom {% if request.resolver_match.url_name == 'crime-management' %}active{% endif %}" href="/crime-management/">Reports</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom {% if request.resolver_match.url_name == 'analytics' %}active{% endif %}" href="/analytics/">Analytics</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom {% if request.resolver_match.url_name == 'prediction' %}active{% endif %}" href="/prediction/">ML Prediction</a>
                    </li>
                    <li class="nav-item d-none" id="nav-audit-logs-item">
                        <a class="nav-link nav-link-custom {% if request.resolver_match.url_name == 'audit-logs' %}active{% endif %}" href="/audit-logs/">Audit Logs</a>
                    </li>
                </ul>
                
                <!-- Authentication Status Widgets -->
                <ul class="navbar-nav align-items-center">
                    <!-- If logged out -->
                    <div id="auth-nav-links" class="d-none align-items-center">
                        <li class="nav-item">
                            <a class="nav-link nav-link-custom" href="/login/">Login</a>
                        </li>
                        <li class="nav-item">
                            <a class="btn btn-sm btn-grad ms-2" href="/register/">Sign Up</a>
                        </li>
                    </div>
                    
                    <!-- If logged in -->
                    <div id="user-nav-item" class="d-none align-items-center">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle d-flex align-items-center text-white gap-2" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                                <div class="profile-badge" id="nav-profile-char">-</div>
                                <span id="nav-username">User</span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark border-secondary bg-dark shadow mt-2">
                                <li><a class="dropdown-item" href="/profile/"><i class="bi bi-person me-2"></i>My Profile</a></li>
                                <li><hr class="dropdown-divider border-secondary"></li>
                                <li><a class="dropdown-item text-danger logout-btn" href="#" id="nav-logout-btn"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                            </ul>
                        </li>
                        <li class="nav-item ms-lg-2">
                            <a class="nav-link nav-link-custom logout-btn" href="#" style="color: var(--danger) !important;"><i class="bi bi-box-arrow-right me-1"></i>Logout</a>
                        </li>
                    </div>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container my-5">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bundle.min.js"></script>
    
    <!-- Base API Utility -->
    <script src="/static/js/api.js"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
