name: Crime Analysis & Prediction System CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      # Optional: setup postgreSQL if required, but we fallback to SQLite for testing
      # which is faster and isolated in CI pipelines.
      
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/requirements.txt

    - name: Run Django Tests
      env:
        USE_SQLITE: "True"
        SECRET_KEY: "django-ci-testing-key-secret-do-not-use-in-production"
      run: |
        python -m pytest tests/
